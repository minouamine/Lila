<script>
(function () {

    /* ===== PARTICLES ===== */

    const canvas = document.getElementById('particleCanvas');
    const ctx    = canvas.getContext('2d');
    let particles = [];
    let particleColors = ['#32CD32', '#7FFF00'];

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function Particle() { this.reset(); }
    Particle.prototype.reset = function () {
        this.x       = Math.random() * canvas.width;
        this.y       = Math.random() * canvas.height;
        this.size    = Math.random() * 1.4 + 0.3;
        this.speedX  = (Math.random() - 0.5) * 0.28;
        this.speedY  = (Math.random() - 0.5) * 0.28;
        this.opacity = Math.random() * 0.45 + 0.08;
        this.color   = particleColors[Math.random() > 0.65 ? 0 : 1];
    };
    Particle.prototype.update = function () {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
    };
    Particle.prototype.draw = function () {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle   = this.color;
        ctx.globalAlpha = this.opacity;
        ctx.fill();
    };

    for (let i = 0; i < 100; i++) particles.push(new Particle());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1;
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    /* ===== STATE ===== */
    let currentLang = localStorage.getItem('lila_lang') || 'ar';
    let isDark = (localStorage.getItem('lila_mode') || 'dark') === 'dark';

    /* ===== LANGUAGE ===== */
    window.switchLang = function (lang) {
        currentLang = lang;
        document.documentElement.lang = lang;
        document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';

        document.querySelectorAll('[data-ar]').forEach(el => {
            el.textContent = lang === 'ar' ? el.dataset.ar : el.dataset.fr;
        });

        const inp = document.getElementById('searchInput');
        if (inp) {
            inp.placeholder = lang === 'ar'
                ? inp.dataset.placeholderAr
                : inp.dataset.placeholderFr;
        }

        document.getElementById('lbAr').classList.toggle('active', lang === 'ar');
        document.getElementById('lbFr').classList.toggle('active', lang === 'fr');

        localStorage.setItem('lila_lang', lang);
        updateModeLabel();
    };

    /* ===== DARK / LIGHT MODE ===== */
    window.toggleMode = function () {
        isDark = !isDark;
        applyMode();
    };

    function applyMode() {
        const body = document.getElementById('bodyEl');
        body.classList.toggle('dark-mode',  isDark);
        body.classList.toggle('light-mode', !isDark);
        document.getElementById('modeToggle').classList.toggle('on', isDark);
        localStorage.setItem('lila_mode', isDark ? 'dark' : 'light');
        updateModeLabel();
    }

    function updateModeLabel() {
        const ico = document.getElementById('modeIco');
        const txt = document.getElementById('modeText');
        if (!ico || !txt) return;
        ico.textContent = isDark ? '🌙' : '☀️';
        txt.textContent = isDark
            ? (currentLang === 'ar' ? 'الوضع الداكن' : 'Mode sombre')
            : (currentLang === 'ar' ? 'الوضع الفاتح' : 'Mode clair');
    }

    /* ===== THEME COLOR ===== */
    const THEMES = ['theme-lime','theme-magenta','theme-rose','theme-violet','theme-teal','theme-gold'];
    const THEME_PARTICLES = {
        'theme-lime':    ['#32CD32', '#7FFF00'],
        'theme-magenta': ['#FF00FF', '#c084fc'],
        'theme-rose':    ['#FB7185', '#E11D78'],
        'theme-violet':  ['#A78BFA', '#7C3AED'],
        'theme-teal':    ['#2DD4BF', '#0D9488'],
        'theme-gold':    ['#F59E0B', '#B45309'],
    };

    window.switchTheme = function (swatch) {
        const t = swatch.dataset.theme;
        const body = document.getElementById('bodyEl');
        THEMES.forEach(th => body.classList.remove(th));
        body.classList.add(t);
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        particleColors = THEME_PARTICLES[t] || ['#32CD32', '#7FFF00'];
        particles.forEach(p => p.reset());
        localStorage.setItem('lila_theme', t);
    };

    /* ===== BOTTOM NAV ===== */
    window.setNav = function (idx, url) {
        document.querySelectorAll('.nav-item').forEach((n, i) =>
            n.classList.toggle('active', i === idx));
        document.getElementById('mainFrame').src = url;
    };

    /* ===== SETTINGS ===== */
    window.openSettings = function () {
        document.getElementById('settingsOverlay').classList.add('open');
    };
    window.onOverlayClick = function (e) {
        if (e.target === document.getElementById('settingsOverlay')) {
            document.getElementById('settingsOverlay').classList.remove('open');
        }
    };

    /* ===== INIT — restore saved preferences ===== */
    (function init() {
        // mode
        const body = document.getElementById('bodyEl');
        body.classList.toggle('dark-mode',  isDark);
        body.classList.toggle('light-mode', !isDark);
        document.getElementById('modeToggle').classList.toggle('on', isDark);

        // theme
        const savedTheme = localStorage.getItem('lila_theme') || 'theme-lime';
        THEMES.forEach(t => body.classList.remove(t));
        body.classList.add(savedTheme);
        const activeSwatch = document.querySelector(`.swatch[data-theme="${savedTheme}"]`);
        if (activeSwatch) {
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            activeSwatch.classList.add('active');
        }
        particleColors = THEME_PARTICLES[savedTheme] || ['#32CD32', '#7FFF00'];

        // lang
        switchLang(currentLang);
    })();

})();
</script>
