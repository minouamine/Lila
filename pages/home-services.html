<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ليلى - خدمات منزلية</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* أنماط إضافية لصفحة الخدمات المنزلية */
        .services-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent-orange);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-back:hover {
            text-decoration: underline;
        }
        
        /* شريط الفلاتر */
        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
        }
        
        .filter-group {
            flex: 1;
            min-width: 140px;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-surface);
            border: 1px solid var(--border-active);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-arabic);
            font-size: 0.9rem;
        }
        
        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 2px var(--glow-orange);
        }
        
        .service-type-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }
        
        .service-type-btn {
            padding: 6px 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-active);
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        
        .service-type-btn.active {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
            color: white;
        }
        
        .price-range {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .price-range input {
            width: 80px;
        }
        
        .online-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
        }
        
        .online-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00c87a;
            display: inline-block;
            animation: onlinePulse 1.5s infinite;
        }
        
        @keyframes onlinePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .search-btn {
            background: linear-gradient(135deg, var(--accent-orange), #ff4500);
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.3s;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--glow-orange);
        }
        
        .emergency-filter {
            background: rgba(239,68,68,0.1);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .emergency-filter.active {
            background: rgba(239,68,68,0.3);
            border: 1px solid var(--red);
        }
        
        .emergency-filter input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        /* تبديل عرض القائمة / الخريطة */
        .view-toggle {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .view-btn {
            padding: 8px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-active);
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--font-arabic);
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .view-btn.active {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
            color: white;
        }
        
        /* عرض القائمة */
        .results-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .results-list.active {
            display: grid;
        }
        
        .service-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--border-subtle);
        }
        
        .service-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-orange);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .service-card.emergency-highlight {
            border: 2px solid var(--red);
            background: linear-gradient(135deg, var(--bg-card), rgba(239,68,68,0.1));
        }
        
        .service-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            background: var(--bg-surface);
        }
        
        .service-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 12px 0 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .gold-badge {
            color: gold;
            font-size: 0.9rem;
        }
        
        .online-badge {
            background: #00c87a;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        
        .emergency-badge {
            background: var(--red);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            animation: emergencyBlink 1s infinite;
        }
        
        @keyframes emergencyBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .service-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 8px 0;
        }
        
        .stars {
            color: gold;
            font-size: 0.9rem;
        }
        
        .service-types {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin: 10px 0;
        }
        
        .type-tag {
            background: rgba(255,140,0,0.15);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        
        .service-price {
            color: var(--accent-orange);
            font-weight: bold;
            font-size: 1rem;
            margin: 8px 0;
        }
        
        .service-distance {
            color: var(--text-dim);
            font-size: 0.75rem;
            margin-top: 8px;
        }
        
        .service-location {
            color: var(--text-secondary);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .emergency-available {
            color: var(--red);
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 5px;
        }
        
        /* عرض الخريطة */
        .map-view {
            display: none;
            height: 550px;
            border-radius: 16px;
            overflow: hidden;
        }
        
        .map-view.active {
            display: block;
        }
        
        /* حالة عدم وجود نتائج */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            border-radius: 20px;
        }
        
        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        
        .no-results h3 {
            color: var(--accent-orange);
            margin-bottom: 10px;
        }
        
        /* مؤشر التحميل */
        .loading-results {
            text-align: center;
            padding: 60px 20px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-active);
            border-top-color: var(--accent-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .services-container { padding: 12px; }
            .filters-bar { flex-direction: column; }
            .filter-group { min-width: auto; }
            .online-checkbox { margin-top: 0; }
            .search-btn { margin-top: 10px; }
            .results-list { grid-template-columns: 1fr; }
            .view-toggle { justify-content: center; }
            .price-range { flex-direction: column; }
            .price-range input { width: 100%; }
            .service-type-group { justify-content: center; }
        }
    </style>
</head>

<script>
    // ========================================
    // المتغيرات العامة
    // ========================================
    let map = null;
    let markers = [];
    let results = [];
    let userLocation = null;
    let wilayasList = [];
    let selectedServiceType = 'all';
    let emergencyOnly = false;
    
    // ========================================
    // تحميل قائمة الولايات من ملف JSON
    // ========================================
    async function loadWilayas() {
        try {
            const response = await fetch('../assets/data/wilayas.json');
            if (!response.ok) {
                throw new Error('Failed to load wilayas.json');
            }
            wilayasList = await response.json();
            
            const select = document.getElementById('filterWilaya');
            select.innerHTML = '<option value="" data-ar="جميع الولايات" data-fr="Toutes les wilayas">جميع الولايات</option>';
            
            const currentLang = window.lang ? window.lang.getCurrentLang() : 'ar';
            wilayasList.forEach(wilaya => {
                const option = document.createElement('option');
                option.value = wilaya.code;
                option.textContent = currentLang === 'fr' ? wilaya.name_fr : wilaya.name_ar;
                option.setAttribute('data-ar', wilaya.name_ar);
                option.setAttribute('data-fr', wilaya.name_fr);
                select.appendChild(option);
            });
        } catch (error) {
            console.error('Error loading wilayas:', error);
        }
    }
    
    // ========================================
    // تحديث النصوص عند تغيير اللغة
    // ========================================
    function updateLanguageForSelects() {
        const currentLang = window.lang ? window.lang.getCurrentLang() : 'ar';
        
        // تحديث خيارات الولاية
        const wilayaSelect = document.getElementById('filterWilaya');
        Array.from(wilayaSelect.options).forEach(option => {
            if (option.value === '') {
                option.textContent = currentLang === 'fr' ? 'Toutes les wilayas' : 'جميع الولايات';
            } else {
                const arText = option.getAttribute('data-ar');
                const frText = option.getAttribute('data-fr');
                if (arText && frText) {
                    option.textContent = currentLang === 'fr' ? frText : arText;
                }
            }
        });
        
        // تحديث خيارات الترتيب
        const sortSelect = document.getElementById('filterSort');
        Array.from(sortSelect.options).forEach(option => {
            const arText = option.getAttribute('data-ar');
            const frText = option.getAttribute('data-fr');
            if (arText && frText) {
                option.textContent = currentLang === 'fr' ? frText : arText;
            }
        });
        
        // تحديث أزرار أنواع الخدمات
        document.querySelectorAll('.service-type-btn').forEach(btn => {
            const arText = btn.getAttribute('data-ar');
            const frText = btn.getAttribute('data-fr');
            if (arText && frText) {
                btn.textContent = currentLang === 'fr' ? frText : arText;
            }
        });
        
        // تحديث placeholder لحقول السعر
        const minPrice = document.getElementById('minPrice');
        const maxPrice = document.getElementById('maxPrice');
        minPrice.placeholder = currentLang === 'fr' ? 'Min' : 'الحد الأدنى';
        maxPrice.placeholder = currentLang === 'fr' ? 'Max' : 'الحد الأعلى';
    }
    
    // ========================================
    // تهيئة أزرار أنواع الخدمات
    // ========================================
    function initServiceTypeButtons() {
        document.querySelectorAll('.service-type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.service-type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedServiceType = btn.getAttribute('data-type');
                performSearch();
            });
        });
    }
    
    // ========================================
    // تهيئة فلتر الطوارئ
    // ========================================
    function initEmergencyFilter() {
        const emergencyCheckbox = document.getElementById('filterEmergency');
        const emergencyFilterDiv = document.getElementById('emergencyFilter');
        
        emergencyCheckbox.addEventListener('change', () => {
            emergencyOnly = emergencyCheckbox.checked;
            if (emergencyOnly) {
                emergencyFilterDiv.classList.add('active');
            } else {
                emergencyFilterDiv.classList.remove('active');
            }
            performSearch();
        });
    }
    
    // ========================================
    // الحصول على موقع المستخدم الحالي
    // ========================================
    function getUserLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    console.log('User location obtained:', userLocation);
                },
                (error) => {
                    console.log('Geolocation error:', error.message);
                }
            );
        }
    }
    
    // ========================================
    // حساب المسافة بين نقطتين (Haversine formula)
    // ========================================
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }
    
    // ========================================
    // البحث عن الخدمات المنزلية
    // ========================================
    async function performSearch() {
        // إظهار مؤشر التحميل
        const listContainer = document.getElementById('listView');
        listContainer.innerHTML = `
            <div class="loading-results">
                <div class="spinner"></div>
                <p data-ar="جاري البحث عن الخدمات المنزلية..." data-fr="Recherche de services à domicile...">جاري البحث عن الخدمات المنزلية...</p>
            </div>
        `;
        if (window.lang) window.lang.updateAllTranslations();
        
        // الحصول على قيم الفلاتر
        const wilaya = document.getElementById('filterWilaya').value;
        const minPrice = document.getElementById('minPrice').value;
        const maxPrice = document.getElementById('maxPrice').value;
        const onlineOnly = document.getElementById('filterOnline').checked;
        const sortBy = document.getElementById('filterSort').value;
        
        // بناء كائن الفلاتر - فقط الخدمات المنزلية
        let filters = { services: ['home_service'] };
        if (wilaya) filters.wilaya_code = parseInt(wilaya);
        if (onlineOnly) filters.is_online = true;
        
        try {
            // محاولة جلب البيانات من Supabase
            if (window.lilaAPI && typeof window.lilaAPI.getBusinessProfiles === 'function') {
                results = await window.lilaAPI.getBusinessProfiles(filters, 100, 0);
            } else {
                // بيانات تجريبية في حالة عدم وجود Supabase
                console.warn('lilaAPI not available, using mock data');
                results = getMockData();
                if (wilaya) results = results.filter(r => r.wilaya_code == wilaya);
                if (onlineOnly) results = results.filter(r => r.is_online);
            }
            
            // فلترة حسب نوع الخدمة الفرعي
            if (selectedServiceType !== 'all') {
                results = results.filter(r => 
                    r.sub_services && r.sub_services.includes(selectedServiceType)
                );
            }
            
            // فلترة حسب الطوارئ
            if (emergencyOnly) {
                results = results.filter(r => r.emergency_available);
            }
            
            // ترتيب النتائج
            if (sortBy === 'rating') {
                results.sort((a, b) => (b.avg_rating || 0) - (a.avg_rating || 0));
            } else if (sortBy === 'followers') {
                results.sort((a, b) => (b.followers_count || 0) - (a.followers_count || 0));
            } else if (sortBy === 'nearest' && userLocation) {
                results.forEach(r => {
                    if (r.latitude && r.longitude) {
                        r.distance = calculateDistance(userLocation.lat, userLocation.lng, r.latitude, r.longitude);
                    } else {
                        r.distance = Infinity;
                    }
                });
                results.sort((a, b) => (a.distance || Infinity) - (b.distance || Infinity));
            }
            
            // عرض النتائج
            renderListView();
            renderMapView();
            
        } catch (error) {
            console.error('Search error:', error);
            listContainer.innerHTML = `
                <div class="no-results">
                    <div class="no-results-icon">⚠️</div>
                    <h3 data-ar="حدث خطأ" data-fr="Une erreur est survenue">حدث خطأ</h3>
                    <p data-ar="فشل الاتصال بقاعدة البيانات. يرجى المحاولة مرة أخرى." data-fr="Échec de connexion à la base de données. Veuillez réessayer.">فشل الاتصال بقاعدة البيانات. يرجى المحاولة مرة أخرى.</p>
                </div>
            `;
            if (window.lang) window.lang.updateAllTranslations();
        }
    }

    function renderListView() {

                <div class="no-results">

                    <p data-ar="لم نعثر على خدمات منزلية في هذه المنطقة" data-fr="Aucun service à domicile dans cette région">لم نعثر على خدمات منزلية في هذه المنطقة</p>

    // ========================================
    // عرض الخريطة
    // ========================================
    function renderMapView() {
        const mapContainer = document.getElementById('mapView');
        
        if (!mapContainer) return;
        
        // تهيئة الخريطة إذا لم تكن موجودة
        if (!map) {
            map = L.map('mapView').setView([36.7538, 3.0588], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
                subdomains: 'abcd'
            }).addTo(map);
        }
        
        // إزالة العلامات القديمة
        markers.forEach(marker => map.removeLayer(marker));
        markers = [];
        
        // إضافة علامات جديدة
        let bounds = null;
        
        results.forEach(business => {
            if (business.latitude && business.longitude) {
                // أيقونة مخصصة للخدمات المنزلية (خضراء، وللطوارئ حمراء)
                const iconColor = business.emergency_available ? '#ef4444' : '#00c87a';
                const homeIcon = L.divIcon({
                    html: `<div style="background: ${iconColor}; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>`,
                    iconSize: [14, 14],
                    className: 'home-marker'
                });
                
                const marker = L.marker([business.latitude, business.longitude], { icon: homeIcon })
                    .bindPopup(`
                        <div style="text-align: center; min-width: 180px;">
                            <img src="${business.logo_url || '../assets/images/default-business.png'}" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-bottom: 8px;" onerror="this.src='https://via.placeholder.com/50'">
                            <h4 style="margin: 5px 0;">${DOMPurify.sanitize(business.business_name)}</h4>
                            <div style="color: gold;">⭐ ${business.avg_rating || 0}</div>
                            <div style="font-size: 0.8rem;">🏠 ${window.lang && window.lang.getCurrentLang() === 'fr' ? 'Services à domicile' : 'خدمات منزلية'}</div>
                            ${business.emergency_available ? '<div style="color: #ef4444;">🚨 ' + (window.lang && window.lang.getCurrentLang() === 'fr' ? 'Urgence disponible' : 'طوارئ متاحة') + '</div>' : ''}
                            <a href="business-profile.html?id=${business.id}" style="display: inline-block; margin-top: 8px; color: #ff8c00; text-decoration: none;">${window.lang && window.lang.getCurrentLang() === 'fr' ? 'Voir détails →' : 'عرض التفاصيل →'}</a>
                        </div>
                    `)
                    .addTo(map);
                markers.push(marker);
                
                if (!bounds) {
                    bounds = L.latLngBounds([business.latitude, business.longitude]);
                } else {
                    bounds.extend([business.latitude, business.longitude]);
                }
            }
        });
        
        // توسيع الخريطة لتناسب جميع العلامات
        if (bounds && markers.length > 0) {
            map.fitBounds(bounds.pad(0.1));
        } else if (userLocation) {
            map.setView([userLocation.lat, userLocation.lng], 10);
        } else {
            map.setView([36.7538, 3.0588], 6);
        }
    }
    
    // ========================================
    // تبديل عرض القائمة / الخريطة
    // ========================================
    function initViewToggle() {
        const listView = document.getElementById('listView');
        const mapView = document.getElementById('mapView');
        
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const view = btn.getAttribute('data-view');
                
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if (view === 'list') {
                    listView.classList.add('active');
                    mapView.classList.remove('active');
                } else {
                    listView.classList.remove('active');
                    mapView.classList.add('active');
                    setTimeout(() => {
                        if (map) map.invalidateSize();
                    }, 100);
                }
            });
        });
    }
    
    // ========================================
    // مودال المطور
    // ========================================
    function initDevModal() {
        const devModal = document.getElementById('devModal');
        const openBtn = document.getElementById('openDevBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        
        if (openBtn) openBtn.addEventListener('click', () => devModal.classList.add('show'));
        if (closeBtn) closeBtn.addEventListener('click', () => devModal.classList.remove('show'));
        if (devModal) devModal.addEventListener('click', e => { if (e.target === devModal) devModal.classList.remove('show'); });
    }
    
    // ========================================
    // موسيقى الخلفية
    // ========================================
    function initMusicToggle() {
        const musicBtn = document.getElementById('musicToggleBtn');
        let audio = null;
        let playing = false;
        
        if (musicBtn) {
            musicBtn.addEventListener('click', () => {
                if (!audio) {
                    audio = new Audio('../assets/music/bg.mp3');
                    audio.loop = true;
                    audio.volume = 0.3;
                }
                if (playing) {
                    audio.pause();
                    musicBtn.textContent = '🔇';
                } else {
                    audio.play().catch(() => {});
                    musicBtn.textContent = '🔊';
                }
                playing = !playing;
            });
        }
    }

        // تحميل قائمة الولايات
