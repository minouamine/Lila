<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الحجوزات - ليلى</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        /* ========== OVERRIDE: full-bleed iframe child ========== */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--c-bg);
            font-family: 'Cairo', sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
        }
        body::before { display: none; }

        .app {
            width: 100%; max-width: 100%;
            height: 100%; min-height: 100%;
            border-radius: 0; border: none;
            box-shadow: none; animation: none;
            display: flex; flex-direction: column;
            overflow: hidden;
            background: var(--c-bg);
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 14px 16px;
            display: flex; flex-direction: column;
            gap: 12px;
        }

        /* ========== HEADER ========== */
        .vto-header {
            text-align: center;
            padding: 2px 0 0;
            flex-shrink: 0;
        }
        .vto-header h1 {
            font-size: 1.15rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--c-primary-light), var(--c-primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .vto-header p {
            font-size: 0.65rem;
            color: var(--c-text-3);
            margin-top: 2px;
            font-weight: 600;
        }

        /* ========== BACK BUTTON ========== */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--c-primary);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            background: var(--c-glow-soft);
            border: 1px solid var(--c-border);
            transition: all 0.2s;
            width: fit-content;
        }
        .btn-back:hover {
            background: var(--c-primary);
            color: #fff;
            box-shadow: 0 4px 14px var(--c-glow);
        }

        /* ========== BOOKING FORM ========== */
        .booking-form {
            background: var(--c-card);
            border: 1px solid var(--c-border);
            border-radius: 16px;
            padding: 16px;
            transition: border-color 0.2s;
        }
        .booking-form:hover {
            border-color: var(--c-border-act);
        }

        .business-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--c-border);
            margin-bottom: 14px;
        }
        .business-info-img {
            width: 48px; height: 48px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--c-border);
        }
        .business-info-name {
            font-size: 1rem;
            font-weight: 800;
            color: var(--c-text);
        }
        .business-info-services {
            font-size: 0.65rem;
            color: var(--c-text-3);
            font-weight: 600;
        }

        .form-row {
            margin-bottom: 12px;
        }
        .form-row label {
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
            color: var(--c-text-2);
            font-size: 0.78rem;
        }
        .form-row input,
        .form-row select,
        .form-row textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: 10px;
            color: var(--c-text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: all var(--t);
        }
        .form-row input:focus,
        .form-row select:focus,
        .form-row textarea:focus {
            border-color: var(--c-primary);
            box-shadow: 0 0 0 3px var(--c-glow-soft);
        }
        .form-row input::placeholder,
        .form-row textarea::placeholder {
            color: var(--c-text-3);
        }

        /* ========== EMERGENCY OPTION ========== */
        .emergency-option {
            background: rgba(239, 68, 68, 0.08);
            border: 1.5px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .emergency-option.selected {
            background: rgba(239, 68, 68, 0.18);
            border-color: #ef4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.2);
        }
        .emergency-option input[type="checkbox"] {
            width: 18px; height: 18px;
            accent-color: #ef4444;
            cursor: pointer;
        }
        .emergency-option label {
            margin: 0;
            font-weight: 700;
            color: #ef4444;
            font-size: 0.82rem;
            cursor: pointer;
        }
        .emergency-fee {
            font-size: 0.68rem;
            color: #f87171;
            font-weight: 600;
            margin-right: auto;
        }

        /* ========== SUBMIT BUTTON ========== */
        .btn-submit-booking {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--c-primary-light), var(--c-primary));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Cairo', sans-serif;
        }
        .btn-submit-booking:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--c-glow);
        }
        .btn-submit-booking:active { transform: scale(0.98); }

        /* ========== HISTORY ========== */
        .bookings-history {
            margin-top: 8px;
        }
        .history-title {
            font-size: 0.92rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--c-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background: var(--c-card);
            border: 1px solid var(--c-border);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            transition: all 0.2s;
        }
        .history-item:hover {
            border-color: var(--c-border-act);
            box-shadow: 0 4px 12px var(--c-glow-soft);
            transform: translateY(-1px);
        }

        .history-business-name {
            font-weight: 700;
            color: var(--c-text);
            font-size: 0.88rem;
        }
        .history-meta {
            font-size: 0.68rem;
            color: var(--c-text-3);
            font-weight: 600;
            margin-top: 2px;
        }
        .history-emergency {
            font-size: 0.60rem;
            color: #ef4444;
            font-weight: 700;
            margin-top: 2px;
        }

        .history-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #fff;
        }
        .status-pending { background: #f59e0b; }
        .status-confirmed { background: #10b981; }
        .status-completed { background: #3b82f6; }
        .status-cancelled { background: #64748b; }

        .rate-btn {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a1a2e;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.72rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.2s;
        }
        .rate-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
        }
        .rated-text {
            font-size: 0.68rem;
            color: #fbbf24;
            font-weight: 700;
        }

        /* ========== REVIEW MODAL ========== */
        #reviewModal {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .review-modal-content {
            background: var(--c-card);
            border: 1px solid var(--c-border);
            border-radius: 20px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px var(--c-glow-soft);
        }
        .review-modal-content h2 {
            color: var(--c-primary);
            margin-bottom: 16px;
            font-size: 1.1rem;
            font-weight: 800;
        }
        .review-modal-content .form-row {
            margin-bottom: 10px;
        }
        .review-modal-content .form-row label {
            font-size: 0.75rem;
        }
        .review-modal-content select,
        .review-modal-content textarea,
        .review-modal-content input[type="file"] {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: 10px;
            padding: 8px 12px;
            color: var(--c-text);
            font-family: 'Cairo', sans-serif;
            font-size: 0.82rem;
            width: 100%;
            outline: none;
        }
        .review-modal-content select:focus,
        .review-modal-content textarea:focus {
            border-color: var(--c-primary);
            box-shadow: 0 0 0 3px var(--c-glow-soft);
        }
        .btn-review-submit {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--c-primary-light), var(--c-primary));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.88rem;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-review-submit:hover {
            box-shadow: 0 4px 14px var(--c-glow);
            transform: translateY(-1px);
        }
        .btn-review-cancel {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            background: transparent;
            border: 1.5px solid var(--c-border);
            border-radius: 10px;
            color: var(--c-text-2);
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.82rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        .btn-review-cancel:hover {
            border-color: var(--c-border-act);
            color: var(--c-text);
        }

        /* ========== EMPTY / LOADING STATES ========== */
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--c-text-3);
            font-size: 0.85rem;
            font-weight: 600;
        }
        .error-state {
            text-align: center;
            padding: 20px;
            color: #ef4444;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .main-content { padding: 8px 10px 12px; }
            .booking-form { padding: 12px; }
            .business-info-img { width: 40px; height: 40px; }
            .history-item { flex-direction: column; text-align: center; }
            .history-item > div { width: 100%; }
            .review-modal-content { padding: 16px; }
        }
    </style>
<base target="_blank">
</head>
<body>

    <div class="app">
        <div class="main-content">

            <!-- HEADER -->
            <div class="vto-header">
                <h1>📅 الحجوزات</h1>
                <p>احجزي الخدمة التي تريدينها</p>
            </div>

            <a href="javascript:history.back()" class="btn-back">← رجوع</a>

            <div class="bookings-container">
                <!-- نموذج الحجز -->
                <div class="booking-form" id="bookingFormContainer">
                    <div class="business-info" id="businessInfo">
                        <div class="empty-state" style="width:100%;">جاري تحميل معلومات الحساب...</div>
                    </div>

                    <div class="form-row">
                        <label>نوع الخدمة 📋</label>
                        <select id="serviceType">
                            <option value="salon">حجز موعد صالون</option>
                            <option value="dress">حجز فستان</option>
                            <option value="product">طلب منتج</option>
                            <option value="home">طلب خدمة منزلية</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <label>تاريخ الحجز 📅</label>
                        <input type="date" id="bookingDate" min="">
                    </div>

                    <div class="form-row">
                        <label>وقت الحجز 🕐</label>
                        <input type="time" id="bookingTime">
                    </div>

                    <div class="form-row">
                        <label>ملاحظات إضافية 📝</label>
                        <textarea id="customerNotes" rows="3" placeholder="أضيفي أي تفاصيل إضافية تريدين إبلاغ صاحبة الحساب بها..."></textarea>
                    </div>

                    <!-- خيار الطوارئ -->
                    <div class="emergency-option" id="emergencyOption">
                        <input type="checkbox" id="isEmergency">
                        <label for="isEmergency">🚨 طوارئ نسائية (خلال ساعتين)</label>
                        <span class="emergency-fee">+500 دج</span>
                    </div>

                    <button class="btn-submit-booking" id="submitBookingBtn">📅 تأكيد الحجز</button>
                </div>

                <!-- سجل الحجوزات السابقة -->
                <div class="bookings-history" id="bookingsHistory">
                    <div class="history-title">📋 سجل حجوزاتي</div>
                    <div class="history-list" id="historyList">
                        <div class="empty-state">جاري تحميل حجوزاتك...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- مودال التقييم -->
    <div id="reviewModal">
        <div class="review-modal-content">
            <h2>⭐ قيمي تجربتك</h2>
            <input type="hidden" id="reviewBookingId">
            <input type="hidden" id="reviewBusinessId">
            <div class="form-row">
                <label>جودة العمل</label>
                <select id="ratingQuality">
                    <option value="1">⭐ نجمة</option>
                    <option value="2">⭐⭐ نجمتين</option>
                    <option value="3" selected>⭐⭐⭐ 3 نجوم</option>
                    <option value="4">⭐⭐⭐⭐ 4 نجوم</option>
                    <option value="5">⭐⭐⭐⭐⭐ 5 نجوم</option>
                </select>
            </div>
            <div class="form-row">
                <label>السعر</label>
                <select id="ratingPrice">
                    <option value="1">⭐ نجمة</option>
                    <option value="2">⭐⭐ نجمتين</option>
                    <option value="3" selected>⭐⭐⭐ 3 نجوم</option>
                    <option value="4">⭐⭐⭐⭐ 4 نجوم</option>
                    <option value="5">⭐⭐⭐⭐⭐ 5 نجوم</option>
                </select>
            </div>
            <div class="form-row">
                <label>المعاملة</label>
                <select id="ratingManners">
                    <option value="1">⭐ نجمة</option>
                    <option value="2">⭐⭐ نجمتين</option>
                    <option value="3" selected>⭐⭐⭐ 3 نجوم</option>
                    <option value="4">⭐⭐⭐⭐ 4 نجوم</option>
                    <option value="5">⭐⭐⭐⭐⭐ 5 نجوم</option>
                </select>
            </div>
            <div class="form-row">
                <label>تعليقك</label>
                <textarea id="reviewComment" rows="3" placeholder="شاركينا تجربك مع هذه الخدمة..."></textarea>
            </div>
            <div class="form-row">
                <label>صور (اختياري)</label>
                <input type="file" id="reviewImages" accept="image/*" multiple>
            </div>
            <button class="btn-review-submit" onclick="submitReview()">إرسال التقييم</button>
            <button class="btn-review-cancel" onclick="closeReviewModal()">إلغاء</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/lang.js"></script>

    <script>
        let businessId = null;
        let businessData = null;
        let customerId = null;
        let userBookings = [];

        function getBusinessIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('business');
        }

        async function loadBusinessData() {
            businessId = getBusinessIdFromUrl();
            if (!businessId) {
                document.getElementById('bookingFormContainer').innerHTML = '<div class="error-state">❌ لم يتم تحديد الحساب</div>';
                return;
            }

            businessData = await lilaAPI.getBusinessProfileById(businessId);
            if (!businessData) {
                document.getElementById('bookingFormContainer').innerHTML = '<div class="error-state">❌ الحساب غير موجود</div>';
                return;
            }

            renderBusinessInfo();
            setMinDate();
        }

        function renderBusinessInfo() {
            const container = document.getElementById('businessInfo');
            container.innerHTML = `
                <img class="business-info-img" src="${businessData.logo_url || '../assets/images/default-business.png'}" alt="${businessData.business_name}">
                <div>
                    <div class="business-info-name">${businessData.business_name}</div>
                    <div class="business-info-services">${businessData.services?.slice(0, 3).join(' • ') || ''}</div>
                </div>
            `;
        }

        function setMinDate() {
            const dateInput = document.getElementById('bookingDate');
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            dateInput.min = `${yyyy}-${mm}-${dd}`;
        }

        async function loadUserBookings() {
            const profile = window.auth.getCurrentProfile();
            if (!profile) return;

            customerId = profile.id;
            userBookings = await lilaAPI.getCustomerBookings(customerId);
            renderBookingsHistory();
        }

        function renderBookingsHistory() {
            const container = document.getElementById('historyList');

            if (!userBookings.length) {
                container.innerHTML = '<div class="empty-state">📭 لا توجد حجوزات سابقة</div>';
                return;
            }

            container.innerHTML = userBookings.map(booking => `
                <div class="history-item">
                    <div>
                        <div class="history-business-name">${booking.business_profiles?.business_name || 'خدمة'}</div>
                        <div class="history-meta">📅 ${new Date(booking.booking_date).toLocaleDateString()} | 🕐 ${booking.booking_time}</div>
                        ${booking.is_emergency ? '<div class="history-emergency">🚨 طوارئ</div>' : ''}
                    </div>
                    <div>
                        <span class="history-status status-${booking.status}">${getStatusText(booking.status)}</span>
                    </div>
                    <div>
                        ${booking.status === 'completed' && !hasUserReviewed(booking.business_id) ?
                            `<button class="rate-btn" onclick="openReviewModal('${booking.business_id}', '${booking.id}')">⭐ قيمي</button>` :
                            booking.status === 'completed' ? '<span class="rated-text">✓ تم التقييم</span>' : ''
                        }
                    </div>
                </div>
            `).join('');
        }

        function getStatusText(status) {
            const map = { pending: 'قيد الانتظار', confirmed: 'مؤكد', completed: 'مكتمل', cancelled: 'ملغي' };
            return map[status] || status;
        }

        function hasUserReviewed(businessId) {
            return false;
        }

        async function createBooking() {
            const profile = window.auth.getCurrentProfile();

            if (!profile) {
                if (confirm('للحجز، يرجى تسجيل الدخول أولا. هل تريدين تسجيل الدخول الآن؟')) {
                    await window.auth.signInWithGoogle();
                }
                return;
            }

            customerId = profile.id;

            const serviceType = document.getElementById('serviceType').value;
            const bookingDate = document.getElementById('bookingDate').value;
            const bookingTime = document.getElementById('bookingTime').value;
            const customerNotes = document.getElementById('customerNotes').value;
            const isEmergency = document.getElementById('isEmergency').checked;

            if (!bookingDate || !bookingTime) {
                utils.showToast('الرجاء اختيار التاريخ والوقت', 'error');
                return;
            }

            const bookingData = {
                business_id: businessId,
                customer_id: customerId,
                service_type: serviceType,
                booking_date: bookingDate,
                booking_time: bookingTime,
                customer_notes: customerNotes,
                is_emergency: isEmergency,
                emergency_fee: isEmergency ? 500 : 0,
                status: 'pending'
            };

            const result = await lilaAPI.createBooking(bookingData);
            if (result) {
                utils.showToast('تم إرسال طلب الحجز بنجاح! سيتم إشعارك عند التأكيد', 'success');
                document.getElementById('customerNotes').value = '';
                document.getElementById('isEmergency').checked = false;
                document.getElementById('emergencyOption').classList.remove('selected');
                await loadUserBookings();
            }
        }

        let currentReviewBusinessId = null;
        let currentReviewBookingId = null;

        window.openReviewModal = (businessId, bookingId) => {
            currentReviewBusinessId = businessId;
            currentReviewBookingId = bookingId;
            document.getElementById('reviewModal').style.display = 'flex';
        };

        window.closeReviewModal = () => {
            document.getElementById('reviewModal').style.display = 'none';
            currentReviewBusinessId = null;
            currentReviewBookingId = null;
        };

        window.submitReview = async () => {
            const quality = parseInt(document.getElementById('ratingQuality').value);
            const price = parseInt(document.getElementById('ratingPrice').value);
            const manners = parseInt(document.getElementById('ratingManners').value);
            const comment = document.getElementById('reviewComment').value;
            const overall = utils.calculateOverallRating(quality, price, manners);

            const reviewData = {
                business_id: currentReviewBusinessId,
                customer_id: customerId,
                rating_quality: quality,
                rating_price: price,
                rating_manners: manners,
                rating_overall: overall,
                comment: comment
            };

            const result = await lilaAPI.createReview(reviewData);
            if (result) {
                utils.showToast('شكرا لتقييمك!', 'success');
                closeReviewModal();
                await loadUserBookings();
            }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            await window.auth.getCurrentSession();
            await loadBusinessData();
            await loadUserBookings();

            document.getElementById('submitBookingBtn').addEventListener('click', createBooking);

            const emergencyOption = document.getElementById('emergencyOption');
            const emergencyCheckbox = document.getElementById('isEmergency');
            emergencyOption.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    emergencyCheckbox.checked = !emergencyCheckbox.checked;
                }
                emergencyOption.classList.toggle('selected', emergencyCheckbox.checked);
            });
        });
    </script>
</body>
</html>
