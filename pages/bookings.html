<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الحجوزات - ليلى</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        /* أنماط إضافية لصفحة الحجوزات */
        .bookings-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* نموذج الحجز */
        .booking-form {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 25px;
        }
        
        .business-info {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-dim);
            margin-bottom: 20px;
        }
        
        .business-info-img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
        }
        
        .business-info-name {
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .form-row {
            margin-bottom: 18px;
        }
        
        .form-row label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .form-row input, .form-row select, .form-row textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-surface);
            border: 1px solid var(--border-active);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: var(--font-arabic);
        }
        
        .emergency-option {
            background: rgba(239,68,68,0.1);
            border: 1px solid var(--red);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .emergency-option.selected {
            background: rgba(239,68,68,0.3);
            border-color: var(--red);
            box-shadow: 0 0 10px rgba(239,68,68,0.3);
        }
        
        .emergency-fee {
            font-size: 0.8rem;
            color: var(--red);
        }
        
        .btn-submit-booking {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-orange), #ff4500);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit-booking:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--glow-orange);
        }
        
        /* قائمة الحجوزات السابقة */
        .bookings-history {
            margin-top: 30px;
        }
        
        .history-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--accent-orange);
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .history-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .history-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        .status-pending { background: #f87171; }
        .status-confirmed { background: #00c87a; }
        .status-completed { background: #1e6fff; }
        .status-cancelled { background: #64748b; }
        
        .rate-btn {
            background: gold;
            color: #1a1a2e;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        
        @media (max-width: 600px) {
            .history-item { flex-direction: column; text-align: center; }
            .business-info { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<canvas id="particleCanvas" class="particle-canvas"></canvas>
<div class="scanline-overlay"></div>

<div class="app">
    <div class="header">
        <div class="header-grid-lines"></div>
        <div class="app-title">
            <span class="title-line"></span>
            <span class="title-ar">الحجوزات</span>
            <span class="title-line"></span>
        </div>
        <div class="header-sub">احجزي الخدمة التي تريدينها</div>
    </div>

    <div class="main-content">
        <div class="bookings-container">
            <a href="javascript:history.back()" class="btn-back" style="display: inline-block; margin-bottom: 20px; color: var(--accent-orange); text-decoration: none;">← رجوع</a>
            
            <!-- نموذج الحجز -->
            <div class="booking-form" id="bookingFormContainer">
                <div class="business-info" id="businessInfo">
                    <div style="text-align: center; width: 100%; color: var(--text-dim);">جاري تحميل معلومات الحساب...</div>
                </div>
                
                <div class="form-row">
                    <label>نوع الخدمة 📋</label>
                    <select id="serviceType">
                        <option value="salon">حجز موعد صالون</option>
                        <option value="dress">حجز فستان</option>
                        <option value="product">طلب منتج</option>
                        <option value="home">طلب خدمة منزلية</option>
                    </select>
                </div>
                
                <div class="form-row">
                    <label>تاريخ الحجز 📅</label>
                    <input type="date" id="bookingDate" min="">
                </div>
                
                <div class="form-row">
                    <label>وقت الحجز 🕐</label>
                    <input type="time" id="bookingTime">
                </div>
                
                <div class="form-row">
                    <label>ملاحظات إضافية 📝</label>
                    <textarea id="customerNotes" rows="3" placeholder="أضيفي أي تفاصيل إضافية تريدين إبلاغ صاحبة الحساب بها..."></textarea>
                </div>
                
                <!-- خيار الطوارئ -->
                <div class="emergency-option" id="emergencyOption">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="isEmergency">
                        <label for="isEmergency" style="margin: 0; font-weight: 700; color: var(--red);">🚨 طوارئ نسائية (خلال ساعتين)</label>
                    </div>
                    <div class="emergency-fee" id="emergencyFeeDisplay">رسوم إضافية: +500 دج</div>
                </div>
                
                <button class="btn-submit-booking" id="submitBookingBtn">📅 تأكيد الحجز</button>
            </div>
            
            <!-- سجل الحجوزات السابقة -->
            <div class="bookings-history" id="bookingsHistory">
                <div class="history-title">📋 سجل حجوزاتي</div>
                <div class="history-list" id="historyList">
                    <div style="text-align: center; padding: 20px; color: var(--text-dim);">جاري تحميل حجوزاتك...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- مودال التقييم -->
<div id="reviewModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center;">
    <div style="background: var(--bg-card); padding: 30px; border-radius: 20px; max-width: 500px; width: 90%; max-height: 90%; overflow-y: auto;">
        <h2 style="color: var(--accent-orange); margin-bottom: 20px;">⭐ قيمي تجربتك</h2>
        <input type="hidden" id="reviewBookingId">
        <input type="hidden" id="reviewBusinessId">
        <div class="form-row">
            <label>جودة العمل</label>
            <select id="ratingQuality">
                <option value="1">⭐ نجمة</option>
                <option value="2">⭐⭐ نجمتين</option>
                <option value="3" selected>⭐⭐⭐ 3 نجوم</option>
                <option value="4">⭐⭐⭐⭐ 4 نجوم</option>
                <option value="5">⭐⭐⭐⭐⭐ 5 نجوم</option>
            </select>
        </div>
        <div class="form-row">
            <label>السعر</label>
            <select id="ratingPrice">
                <option value="1">⭐ نجمة</option>
                <option value="2">⭐⭐ نجمتين</option>
                <option value="3" selected>⭐⭐⭐ 3 نجوم</option>
                <option value="4">⭐⭐⭐⭐ 4 نجوم</option>
                <option value="5">⭐⭐⭐⭐⭐ 5 نجوم</option>
            </select>
        </div>
        <div class="form-row">
            <label>المعاملة</label>
            <select id="ratingManners">
                <option value="1">⭐ نجمة</option>
                <option value="2">⭐⭐ نجمتين</option>
                <option value="3" selected>⭐⭐⭐ 3 نجوم</option>
                <option value="4">⭐⭐⭐⭐ 4 نجوم</option>
                <option value="5">⭐⭐⭐⭐⭐ 5 نجوم</option>
            </select>
        </div>
        <div class="form-row">
            <label>تعليقك</label>
            <textarea id="reviewComment" rows="3" placeholder="شاركينا تجربك مع هذه الخدمة..."></textarea>
        </div>
        <div class="form-row">
            <label>صور (اختياري)</label>
            <input type="file" id="reviewImages" accept="image/*" multiple>
        </div>
        <button onclick="submitReview()" style="width: 100%; padding: 12px; background: var(--accent-orange); border: none; border-radius: 10px; color: white; font-weight: 700; cursor: pointer;">إرسال التقييم</button>
        <button onclick="closeReviewModal()" style="width: 100%; margin-top: 10px; padding: 10px; background: transparent; border: 1px solid var(--border-active); border-radius: 10px; color: var(--text-secondary); cursor: pointer;">إلغاء</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/lang.js"></script>

<script>
    let businessId = null;
    let businessData = null;
    let customerId = null;
    let userBookings = [];
    
    // الحصول على معرف الحساب من URL
    function getBusinessIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('business');
    }
    
    // تحميل بيانات الحساب التجاري
    async function loadBusinessData() {
        businessId = getBusinessIdFromUrl();
        if (!businessId) {
            document.getElementById('bookingFormContainer').innerHTML = '<div class="booking-form" style="text-align: center; color: var(--red);">❌ لم يتم تحديد الحساب</div>';
            return;
        }
        
        businessData = await lilaAPI.getBusinessProfileById(businessId);
        if (!businessData) {
            document.getElementById('bookingFormContainer').innerHTML = '<div class="booking-form" style="text-align: center; color: var(--red);">❌ الحساب غير موجود</div>';
            return;
        }
        
        renderBusinessInfo();
        setMinDate();
    }
    
    function renderBusinessInfo() {
        const container = document.getElementById('businessInfo');
        container.innerHTML = `
            <img class="business-info-img" src="${businessData.logo_url || '../assets/images/default-business.png'}" alt="${businessData.business_name}">
            <div>
                <div class="business-info-name">${businessData.business_name}</div>
                <div style="color: var(--text-dim);">${businessData.services?.slice(0, 3).join(' • ') || ''}</div>
            </div>
        `;
    }
    
    function setMinDate() {
        const dateInput = document.getElementById('bookingDate');
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        dateInput.min = `${yyyy}-${mm}-${dd}`;
    }
    
    // تحميل حجوزات المستخدمة
    async function loadUserBookings() {
        const profile = window.auth.getCurrentProfile();
        if (!profile) return;
        
        customerId = profile.id;
        userBookings = await lilaAPI.getCustomerBookings(customerId);
        renderBookingsHistory();
    }
    
    function renderBookingsHistory() {
        const container = document.getElementById('historyList');
        
        if (!userBookings.length) {
            container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-dim);">📭 لا توجد حجوزات سابقة</div>';
            return;
        }
        
        container.innerHTML = userBookings.map(booking => `
            <div class="history-item">
                <div>
                    <strong>${booking.business_profiles?.business_name || 'خدمة'}</strong>
                    <div>📅 ${new Date(booking.booking_date).toLocaleDateString()} | 🕐 ${booking.booking_time}</div>
                    <div>${booking.is_emergency ? '🚨 طوارئ' : ''}</div>
                </div>
                <div>
                    <span class="history-status status-${booking.status}">${getStatusText(booking.status)}</span>
                </div>
                <div>
                    ${booking.status === 'completed' && !hasUserReviewed(booking.business_id) ? 
                        `<button class="rate-btn" onclick="openReviewModal('${booking.business_id}', '${booking.id}')">⭐ قيمي</button>` : 
                        booking.status === 'completed' ? '<span style="color: gold;">✓ تم التقييم</span>' : ''
                    }
                </div>
            </div>
        `).join('');
    }
    
    function getStatusText(status) {
        const map = { pending: 'قيد الانتظار', confirmed: 'مؤكد', completed: 'مكتمل', cancelled: 'ملغي' };
        return map[status] || status;
    }
    
    function hasUserReviewed(businessId) {
        // سيتم التحقق من وجود تقييم سابق
        return false;
    }
    
    // إنشاء حجز جديد
    async function createBooking() {
        const profile = window.auth.getCurrentProfile();
        
        if (!profile) {
            if (confirm('للحجز، يرجى تسجيل الدخول أولاً. هل تريدين تسجيل الدخول الآن؟')) {
                await window.auth.signInWithGoogle();
            }
            return;
        }
        
        customerId = profile.id;
        
        const serviceType = document.getElementById('serviceType').value;
        const bookingDate = document.getElementById('bookingDate').value;
        const bookingTime = document.getElementById('bookingTime').value;
        const customerNotes = document.getElementById('customerNotes').value;
        const isEmergency = document.getElementById('isEmergency').checked;
        
        if (!bookingDate || !bookingTime) {
            utils.showToast('الرجاء اختيار التاريخ والوقت', 'error');
            return;
        }
        
        const bookingData = {
            business_id: businessId,
            customer_id: customerId,
            service_type: serviceType,
            booking_date: bookingDate,
            booking_time: bookingTime,
            customer_notes: customerNotes,
            is_emergency: isEmergency,
            emergency_fee: isEmergency ? 500 : 0,
            status: 'pending'
        };
        
        const result = await lilaAPI.createBooking(bookingData);
        if (result) {
            utils.showToast('تم إرسال طلب الحجز بنجاح! سيتم إشعارك عند التأكيد', 'success');
            document.getElementById('customerNotes').value = '';
            document.getElementById('isEmergency').checked = false;
            await loadUserBookings();
        }
    }
    
    // التقييم
    let currentReviewBusinessId = null;
    let currentReviewBookingId = null;
    
    window.openReviewModal = (businessId, bookingId) => {
        currentReviewBusinessId = businessId;
        currentReviewBookingId = bookingId;
        document.getElementById('reviewModal').style.display = 'flex';
    };
    
    window.closeReviewModal = () => {
        document.getElementById('reviewModal').style.display = 'none';
        currentReviewBusinessId = null;
        currentReviewBookingId = null;
    };
    
    window.submitReview = async () => {
        const quality = parseInt(document.getElementById('ratingQuality').value);
        const price = parseInt(document.getElementById('ratingPrice').value);
        const manners = parseInt(document.getElementById('ratingManners').value);
        const comment = document.getElementById('reviewComment').value;
        const overall = utils.calculateOverallRating(quality, price, manners);
        
        const reviewData = {
            business_id: currentReviewBusinessId,
            customer_id: customerId,
            rating_quality: quality,
            rating_price: price,
            rating_manners: manners,
            rating_overall: overall,
            comment: comment
        };
        
        const result = await lilaAPI.createReview(reviewData);
        if (result) {
            utils.showToast('شكراً لتقييمك!', 'success');
            closeReviewModal();
            await loadUserBookings();
        }
    };
    
    // التهيئة
    document.addEventListener('DOMContentLoaded', async () => {
        await window.auth.getCurrentSession();
        await loadBusinessData();
        await loadUserBookings();
        
        document.getElementById('submitBookingBtn').addEventListener('click', createBooking);
        
        // تأثير اختيار الطوارئ
        const emergencyOption = document.getElementById('emergencyOption');
        const emergencyCheckbox = document.getElementById('isEmergency');
        emergencyOption.addEventListener('click', () => {
            emergencyCheckbox.checked = !emergencyCheckbox.checked;
            emergencyOption.classList.toggle('selected', emergencyCheckbox.checked);
        });
        
        if (typeof particles !== 'undefined') particles.init();
    });
</script>
</body>
</html>
