<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الملف التجاري</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* =============================================
           LILA — business-profile.html v2
           Reads theme/mode/lang from localStorage
           ============================================= */

        :root {
            --c-primary:       #32CD32;
            --c-primary-light: #7FFF00;
            --c-primary-dark:  #228B22;
            --c-glow:          rgba(50,205,50,0.32);
            --c-glow-soft:     rgba(50,205,50,0.10);
            --ig-a:#f09433;--ig-b:#e6683c;--ig-c:#dc2743;--ig-d:#cc2366;--ig-e:#bc1888;
            --ig-grad: linear-gradient(45deg,var(--ig-a),var(--ig-b),var(--ig-c),var(--ig-d),var(--ig-e));
            --c-bg:         #040810;
            --c-surface:    #080f1c;
            --c-card:       #0d1628;
            --c-card-h:     #111d35;
            --c-border:     rgba(50,205,50,0.12);
            --c-border-act: rgba(50,205,50,0.50);
            --c-text:       #d8e4f0;
            --c-text-2:     #7a9ab8;
            --c-text-3:     #3d5a78;
            --c-red:        #ef4444;
            --c-blue:       #3b82f6;
            --ease-snap:    cubic-bezier(0.34,1.56,0.64,1);
            --ease-smooth:  cubic-bezier(0.4,0,0.2,1);
            --t:            0.26s var(--ease-smooth);
        }
        .light-mode {
            --c-bg:#f0f4f0;--c-surface:#ffffff;--c-card:#e8f5e8;--c-card-h:#d4edd4;
            --c-border:rgba(34,139,34,0.15);--c-border-act:rgba(34,139,34,0.45);
            --c-text:#000000;--c-text-2:#1a4a1a;--c-text-3:#5a8a5a;
        }
        .theme-lime    {--c-primary:#32CD32;--c-primary-light:#7FFF00;--c-primary-dark:#228B22;--c-glow:rgba(50,205,50,0.32);--c-glow-soft:rgba(50,205,50,0.10);--c-border:rgba(50,205,50,0.12);--c-border-act:rgba(50,205,50,0.50);}
        .theme-magenta {--c-primary:#CC00CC;--c-primary-light:#FF00FF;--c-primary-dark:#8800AA;--c-glow:rgba(204,0,204,0.30);--c-glow-soft:rgba(204,0,204,0.10);--c-border:rgba(204,0,204,0.12);--c-border-act:rgba(204,0,204,0.50);}
        .theme-rose    {--c-primary:#E11D78;--c-primary-light:#FB7185;--c-primary-dark:#9D174D;--c-glow:rgba(225,29,120,0.30);--c-glow-soft:rgba(225,29,120,0.10);--c-border:rgba(225,29,120,0.12);--c-border-act:rgba(225,29,120,0.50);}
        .theme-violet  {--c-primary:#7C3AED;--c-primary-light:#A78BFA;--c-primary-dark:#4C1D95;--c-glow:rgba(124,58,237,0.30);--c-glow-soft:rgba(124,58,237,0.10);--c-border:rgba(124,58,237,0.12);--c-border-act:rgba(124,58,237,0.50);}
        .theme-teal    {--c-primary:#0D9488;--c-primary-light:#2DD4BF;--c-primary-dark:#115E59;--c-glow:rgba(13,148,136,0.30);--c-glow-soft:rgba(13,148,136,0.10);--c-border:rgba(13,148,136,0.12);--c-border-act:rgba(13,148,136,0.50);}
        .theme-gold    {--c-primary:#B45309;--c-primary-light:#F59E0B;--c-primary-dark:#78350F;--c-glow:rgba(180,83,9,0.30);--c-glow-soft:rgba(180,83,9,0.10);--c-border:rgba(180,83,9,0.12);--c-border-act:rgba(180,83,9,0.50);}

        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        button{cursor:pointer;font-family:inherit;border:none;outline:none;}
        a{text-decoration:none;color:inherit;}

        html,body{width:100%;height:100%;overflow-x:hidden;}
        body{
            font-family:'Cairo',sans-serif;
            background:var(--c-bg);
            color:var(--c-text);
            min-height:100%;
            transition:background var(--t),color var(--t);
            position:relative;
        }
        body::before{
            content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
            background:
                radial-gradient(ellipse 70% 40% at 50% 0%,var(--c-glow-soft) 0%,transparent 65%),
                radial-gradient(ellipse 40% 25% at 90% 80%,var(--c-glow-soft) 0%,transparent 55%);
        }
        .scanline-overlay{
            position:fixed;top:0;left:0;width:100%;height:100%;
            z-index:0;pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);
            animation:scanlineScroll 8s linear infinite;
        }
        @keyframes scanlineScroll{0%{background-position:0 0}100%{background-position:0 100px}}

        /* ── WRAPPER ── */
        .pw{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 0 32px;}

        /* ── VACATION ── */
        .vacation-banner{
            background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);
            border-radius:10px;padding:10px 14px;margin:12px 12px 0;
            color:#fca5a5;font-size:0.82rem;font-weight:600;text-align:center;
        }

        /* ── COVER ── */
        .cover{width:100%;overflow:hidden;background:linear-gradient(135deg,var(--c-card),var(--c-card-h));position:relative;}
        .cover:empty{display:none;}
        .cover img{width:100%;height:160px;object-fit:cover;display:block;}

        /* ── HERO ROW (avatar + name + actions) ── */
        .hero{
    display:flex;align-items:flex-end;gap:14px;
    padding:0 16px;margin-top:16px;position:relative;z-index:2;
}
.cover + .hero{
    margin-top:-36px;
}
        .avatar-ring{
            width:80px;height:80px;border-radius:50%;padding:2.5px;
            background:var(--ig-grad);box-shadow:0 0 20px var(--c-glow);flex-shrink:0;
        }
        .avatar-inner{
            width:100%;height:100%;border-radius:50%;overflow:hidden;
            background:var(--c-card);border:3px solid var(--c-bg);
        }
        .avatar-inner img{width:100%;height:100%;object-fit:cover;}

        .hero-info{flex:1;padding-bottom:4px;}
        .hero-name{
            font-size:1.1rem;font-weight:800;color:var(--c-text);
            display:flex;align-items:center;gap:6px;flex-wrap:wrap;
        }
        .badge-gold-icon{color:gold;font-size:0.95rem;}
        .badge-warn{display:inline-block;background:var(--c-red);color:#fff;padding:2px 8px;border-radius:20px;font-size:0.60rem;font-weight:700;}
        .badge-new {display:inline-block;background:var(--c-blue);color:#fff;padding:2px 8px;border-radius:20px;font-size:0.60rem;font-weight:700;}
        .hero-user{font-size:0.75rem;color:var(--c-text-2);margin-top:2px;}

        .hero-actions{display:flex;gap:8px;padding-bottom:4px;flex-shrink:0;}
        .btn{
            padding:7px 16px;border-radius:30px;font-size:0.75rem;font-weight:700;
            font-family:'Cairo',sans-serif;transition:all var(--t);cursor:pointer;border:none;
            white-space:nowrap;
        }
        .btn-follow{background:var(--c-primary);color:#fff;box-shadow:0 4px 14px var(--c-glow);}
        .btn-follow:hover{filter:brightness(1.12);transform:translateY(-1px);}
        .btn-follow.following{background:transparent;border:1.5px solid var(--c-primary);color:var(--c-primary);}
        .btn-fav{background:transparent;border:1.5px solid var(--c-border-act);color:var(--c-text-2);}
        .btn-fav:hover{border-color:gold;color:gold;}
        .btn-fav.favorited{border-color:gold;color:gold;}
        .btn-book{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 4px 14px rgba(59,130,246,0.35);}
        .btn-book:hover{filter:brightness(1.1);transform:translateY(-1px);}

        /* ── STATS ROW ── */
        .stats-row{
            display:flex;gap:0;margin:14px 12px 0;
            background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;overflow:hidden;
        }
        .stat-item{
            flex:1;padding:10px 6px;text-align:center;
            border-left:1px solid var(--c-border);
        }
        .stat-item:last-child{border-left:none;}
        [dir="ltr"] .stat-item{border-left:none;border-right:1px solid var(--c-border);}
        [dir="ltr"] .stat-item:last-child{border-right:none;}
        .stat-val{font-size:1rem;font-weight:800;color:var(--c-primary);}
        .stat-lbl{font-size:0.58rem;color:var(--c-text-3);margin-top:2px;}
        .stars-val{font-size:0.85rem;color:gold;}

        /* ── SERVICES STRIP ── */
        .services-strip{
            display:flex;flex-wrap:wrap;gap:6px;padding:12px 12px 0;
        }
        .svc-tag{
            background:var(--c-glow-soft);border:1px solid var(--c-border-act);
            color:var(--c-primary);padding:4px 12px;border-radius:20px;
            font-size:0.72rem;font-weight:600;
        }

        /* ── SECTION CARD ── */
        .section{
            background:var(--c-card);border:1px solid var(--c-border);
            border-radius:14px;margin:12px 12px 0;padding:14px;
            transition:background var(--t);
        }
        .section-title{
            color:var(--c-primary);font-size:0.88rem;font-weight:700;
            margin-bottom:10px;display:flex;align-items:center;gap:6px;
        }
        .section p{color:var(--c-text);font-size:0.83rem;line-height:1.7;}

        /* ── INFO GRID (2 columns) ── */
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
        .info-cell{
            background:var(--c-surface);border:1px solid var(--c-border);
            border-radius:10px;padding:10px 12px;
        }
        .info-cell-lbl{font-size:0.62rem;color:var(--c-text-3);margin-bottom:3px;}
        .info-cell-val{font-size:0.80rem;color:var(--c-text);font-weight:600;}
        .info-cell-val a{color:var(--c-primary);}
        .info-cell.full{grid-column:1/-1;}

        /* ── CONTACT ICONS ROW ── */
        .contact-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
        .contact-btn{
            display:flex;align-items:center;gap:6px;
            background:var(--c-surface);border:1px solid var(--c-border-act);
            border-radius:10px;padding:8px 14px;font-size:0.78rem;font-weight:600;
            color:var(--c-text);cursor:pointer;text-decoration:none;
            transition:all var(--t);flex:1;min-width:120px;justify-content:center;
        }
        .contact-btn:hover{background:var(--c-glow-soft);border-color:var(--c-primary);color:var(--c-primary);}
        .contact-btn .cicon{font-size:1.1rem;}

        /* social icons */
        .social-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
        .social-btn{
            display:flex;align-items:center;gap:6px;
            border-radius:10px;padding:8px 14px;font-size:0.75rem;font-weight:700;
            cursor:pointer;text-decoration:none;transition:all var(--t);
            border:1px solid var(--c-border);color:#fff;
        }
        .social-btn.instagram{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
        .social-btn.tiktok   {background:#010101;border-color:#69C9D0;}
        .social-btn.facebook {background:#1877F2;}
        .social-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.4);}

        /* ── MAP BUTTON ── */
        .map-btn{
            display:flex;align-items:center;gap:8px;
            background:linear-gradient(135deg,#10b981,#059669);
            color:#fff;border-radius:10px;padding:10px 16px;
            font-size:0.80rem;font-weight:700;cursor:pointer;
            text-decoration:none;transition:all var(--t);margin-top:10px;
            width:fit-content;
        }
        .map-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}

        /* ── VIDEO ── */
        .video-wrap{
            width:100%;border-radius:12px;overflow:hidden;
            background:#000;border:1px solid var(--c-border);
        }
        .video-wrap video{width:100%;max-height:320px;object-fit:cover;display:block;}
        .video-lbl{text-align:center;font-size:0.65rem;color:var(--c-text-3);padding:6px;}

        /* ── TABS ── */
        .tabs-bar{
            display:flex;border-bottom:1px solid var(--c-border);
            margin:14px 12px 0;overflow-x:auto;scrollbar-width:none;
        }
        .tabs-bar::-webkit-scrollbar{display:none;}
        .tab-btn{
            flex-shrink:0;padding:10px 14px;font-size:0.75rem;font-weight:700;
            font-family:'Cairo',sans-serif;background:transparent;border:none;
            border-bottom:2px solid transparent;color:var(--c-text-2);
            cursor:pointer;transition:all var(--t);white-space:nowrap;
        }
        .tab-btn.active{color:var(--c-primary);border-bottom-color:var(--c-primary);}
        .tab-btn:hover:not(.active){color:var(--c-text);}

        #tabContent{padding:0 12px;}

        /* post card */
        .post-card{
            background:var(--c-card);border:1px solid var(--c-border);
            border-radius:12px;padding:14px;margin-top:10px;
        }
        .post-date{font-size:0.68rem;color:var(--c-text-3);margin-bottom:8px;}
        .post-text{font-size:0.83rem;line-height:1.7;color:var(--c-text);}
        .post-imgs{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
        .post-imgs img{width:72px;height:72px;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid var(--c-border);}

        /* gallery */
        .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
        .gallery-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;border:1px solid var(--c-border);transition:transform 0.2s var(--ease-snap);}
        .gallery-grid img:hover{transform:scale(1.04);}

        /* review */
        .review-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:12px;padding:14px;margin-top:10px;}
        .review-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
        .review-author{font-weight:700;font-size:0.85rem;}
        .review-stars{font-size:0.95rem;color:gold;}
        .review-sub{font-size:0.68rem;color:var(--c-text-3);margin-bottom:8px;}
        .review-text{font-size:0.82rem;line-height:1.65;}
        .review-reply{margin-top:10px;background:var(--c-glow-soft);border-right:3px solid var(--c-primary);border-radius:8px;padding:10px 12px;font-size:0.78rem;color:var(--c-text-2);}
        [dir="ltr"] .review-reply{border-right:none;border-left:3px solid var(--c-primary);}
        .review-reply strong{display:block;color:var(--c-primary);font-size:0.72rem;margin-bottom:4px;}

        /* hours */
        .hours-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:6px;}
        .hour-cell{background:var(--c-surface);border:1px solid var(--c-border);border-radius:8px;padding:8px 10px;}
        .hour-day{font-size:0.68rem;color:var(--c-text-3);margin-bottom:2px;}
        .hour-val{font-size:0.78rem;font-weight:700;}
        .hour-open{color:var(--c-primary);}
        .hour-closed{color:var(--c-red);}

        /* empty / loading */
        .empty-state{text-align:center;padding:40px 20px;color:var(--c-text-3);font-size:0.85rem;}
        .empty-icon{font-size:2.5rem;margin-bottom:10px;}
        .loading-state{text-align:center;padding:60px 20px;color:var(--c-text-3);}
        .spinner{width:36px;height:36px;border:3px solid var(--c-border);border-top-color:var(--c-primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .error-state{text-align:center;padding:60px 20px;color:var(--c-red);font-size:0.88rem;}

        /* toast */
        .toast{
            position:fixed;bottom:20px;left:50%;
            transform:translateX(-50%) translateY(20px);
            background:var(--c-card);border:1px solid var(--c-border-act);
            border-radius:30px;padding:10px 22px;font-size:0.80rem;font-weight:600;
            color:var(--c-text);box-shadow:0 8px 30px rgba(0,0,0,0.4);
            z-index:999;opacity:0;transition:all 0.3s var(--ease-smooth);white-space:nowrap;
        }
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .toast.success{border-color:var(--c-primary);color:var(--c-primary);}
        .toast.info   {border-color:var(--c-blue);color:var(--c-blue);}
        .toast.error  {border-color:var(--c-red);color:var(--c-red);}

        /* scrollbar */
        ::-webkit-scrollbar{width:4px;height:4px;}
        ::-webkit-scrollbar-track{background:rgba(4,8,16,0.5);}
        ::-webkit-scrollbar-thumb{background:var(--c-primary);border-radius:4px;}

        @media(max-width:480px){
            .cover{height:120px;}
            .avatar-ring{width:68px;height:68px;}
            .hero{margin-top:-30px;gap:10px;}
            .hero-name{font-size:0.95rem;}
            .gallery-grid{grid-template-columns:repeat(2,1fr);}
            .info-grid{grid-template-columns:1fr;}
            .info-cell.full{grid-column:1;}
            .hero-actions{flex-wrap:wrap;}
            .btn{padding:6px 12px;font-size:0.70rem;}
        }

        /* ── إخفاء debug widget ── */
        #debugConsole, #debugToggle, [id^="debug"], .debug-console,
        div[style*="position: fixed"][style*="bottom"]:not(.toast) {
            display: none !important;
        }

        /* ── LIGHTBOX ── */
        .lightbox{
            display:none;position:fixed;inset:0;z-index:9999;
            background:rgba(0,0,0,0.92);
            align-items:center;justify-content:center;
            flex-direction:column;gap:12px;
        }
        .lightbox.open{display:flex;}
        .lightbox img{
            max-width:92vw;max-height:78vh;
            object-fit:contain;border-radius:10px;
            box-shadow:0 0 40px rgba(0,0,0,0.8);
            transition:opacity 0.2s;
        }
        .lb-close{
            position:absolute;top:16px;left:16px;
            background:rgba(255,255,255,0.15);border:none;
            color:#fff;font-size:1.4rem;width:40px;height:40px;
            border-radius:50%;cursor:pointer;display:flex;
            align-items:center;justify-content:center;
            transition:background 0.2s;
        }
        .lb-close:hover{background:rgba(255,255,255,0.3);}
        .lb-nav{
            display:flex;gap:16px;align-items:center;
        }
        .lb-btn{
            background:rgba(255,255,255,0.15);border:none;
            color:#fff;font-size:1.2rem;width:44px;height:44px;
            border-radius:50%;cursor:pointer;display:flex;
            align-items:center;justify-content:center;
            transition:background 0.2s;
        }
        .lb-btn:hover{background:rgba(255,255,255,0.3);}
        .lb-counter{color:rgba(255,255,255,0.7);font-size:0.80rem;min-width:60px;text-align:center;}
    </style>
</head>
<body id="bodyEl" class="dark-mode theme-lime">
<div class="scanline-overlay"></div>

<div class="pw" id="pw">
    <div class="loading-state">
        <div class="spinner"></div>
        <div>جاري تحميل الملف التجاري...</div>
    </div>
</div>

<div class="toast" id="toastEl"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="lbClose(event)">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <img id="lbImg" src="" alt="">
    <div class="lb-nav">
        <button class="lb-btn" onclick="lbNav(-1)">&#8249;</button>
        <span class="lb-counter" id="lbCounter"></span>
        <button class="lb-btn" onclick="lbNav(1)">&#8250;</button>
    </div>
</div>

<script src="../js/debug.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/lang.js"></script>

<script>
'use strict';

/* ── 1. THEME / MODE / LANG from localStorage ── */
(function applyPrefs() {
    const body  = document.getElementById('bodyEl');
    const lang  = localStorage.getItem('lila_lang')  || 'ar';
    const mode  = localStorage.getItem('lila_mode')  || 'dark';
    const theme = localStorage.getItem('lila_theme') || 'theme-lime';
    const isDark = mode === 'dark';
    body.classList.toggle('dark-mode',  isDark);
    body.classList.toggle('light-mode', !isDark);
    ['theme-lime','theme-magenta','theme-rose','theme-violet','theme-teal','theme-gold']
        .forEach(t => body.classList.remove(t));
    body.classList.add(theme);
    document.documentElement.lang = lang;
    document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
    console.log('[PREFS] mode:', mode, '| theme:', theme, '| lang:', lang);
})();

/* listen for lang/theme changes from parent index */
window.addEventListener('storage', e => {
    if (!['lila_lang','lila_mode','lila_theme'].includes(e.key)) return;
    console.log('[PREFS] localStorage changed:', e.key, e.newValue);
    const body  = document.getElementById('bodyEl');
    const lang  = localStorage.getItem('lila_lang')  || 'ar';
    const mode  = localStorage.getItem('lila_mode')  || 'dark';
    const theme = localStorage.getItem('lila_theme') || 'theme-lime';
    body.classList.toggle('dark-mode',  mode==='dark');
    body.classList.toggle('light-mode', mode!=='dark');
    ['theme-lime','theme-magenta','theme-rose','theme-violet','theme-teal','theme-gold']
        .forEach(t => body.classList.remove(t));
    body.classList.add(theme);
    document.documentElement.lang = lang;
    document.documentElement.dir  = lang === 'ar' ? 'rtl' : 'ltr';
    if (businessData) renderProfile(); /* re-render with new lang */
});

let businessId         = null;
let businessData       = null;
let currentUserProfile = null;
let userIsFollowing    = false;
let userIsFavorited    = false;
let activeTab          = 'posts';

function getLang() { return localStorage.getItem('lila_lang') || 'ar'; }
function t(ar, fr) { return getLang() === 'ar' ? ar : fr; }

/* ── 3. TOAST ── */
function showToast(msg, type='info') {
    const el = document.getElementById('toastEl');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 2800);
}

/* ── 4. RATING COLOR ── */
function ratingClass(avg, cnt) {
    if (!cnt)    return 'default';
    if (avg>=4.5) return 'gold';
    if (avg>=3)   return 'green';
    return 'red';
}
function starsHTML(n) {
    return '★'.repeat(Math.floor(n)) + '☆'.repeat(5-Math.floor(n));
}

/* ── 6. LOAD ── */
async function loadBusinessProfile() {
    console.log('[LOAD] Starting...');
    const params = new URLSearchParams(window.location.search);
    businessId = params.get('id');
    console.log('[LOAD] businessId:', businessId);

    if (!businessId) {
        renderError(t('❌ لم يتم تحديد الحساب','❌ Aucun compte spécifié'));
        return;
    }

    try {
        console.log('[LOAD] Fetching business profile...');
        businessData = await lilaAPI.getBusinessProfileById(businessId);
        console.log('[LOAD] businessData:', businessData);
        if (!businessData) { renderError(t('❌ الحساب غير موجود','❌ Compte introuvable')); return; }
    } catch(err) {
        console.error('[LOAD] Error:', err);
        renderError(t('❌ خطأ في تحميل البيانات','❌ Erreur de chargement'));
        return;
    }

    try {
        console.log('[AUTH] Getting session...');
        await window.auth.getCurrentSession();
        currentUserProfile = window.auth.getCurrentProfile();
        console.log('[AUTH] profile:', currentUserProfile);
    } catch(err) {
        console.warn('[AUTH] Error:', err);
        currentUserProfile = null;
    }

    if (currentUserProfile?.user_type === 'customer') {
        try {
            userIsFollowing = await lilaAPI.isFollowing(currentUserProfile.id, businessId);
            console.log('[FOLLOW] isFollowing:', userIsFollowing);
        } catch(err) { console.warn('[FOLLOW] Error:', err); }

        try {
            const { data: fav, error: favErr } = await supabaseClient
                .from('favorites').select('id')
                .eq('customer_id', currentUserProfile.id)
                .eq('business_id', businessId).single();
            if (favErr && favErr.code !== 'PGRST116') console.warn('[FAV] Error:', favErr);
            userIsFavorited = !!fav;
            console.log('[FAV] isFavorited:', userIsFavorited);
        } catch(err) { console.warn('[FAV] Error:', err); }
    }

    /* fetch gallery from business_gallery table */
    try {
        console.log('[GALLERY] Fetching from business_gallery...');
        const { data: galleryRows, error: gErr } = await supabaseClient
            .from('business_gallery')
            .select('image_url, caption, sort_order')
            .eq('business_id', businessId)
            .order('sort_order', { ascending: true });
        if (gErr) console.warn('[GALLERY] DB error:', gErr);
        businessData._gallery = galleryRows || [];
        /* fallback: gallery_urls column */
        if (!businessData._gallery.length && businessData.gallery_urls?.length) {
            businessData._gallery = businessData.gallery_urls.map(u => ({ image_url: u }));
            console.log('[GALLERY] Using gallery_urls fallback, count:', businessData._gallery.length);
        }
        console.log('[GALLERY] Total images:', businessData._gallery.length);
    } catch(err) { console.warn('[GALLERY] Error:', err); businessData._gallery = []; }

    /* fetch video from business_videos table */
    try {
        console.log('[VIDEO] Fetching from business_videos...');
        const { data: videos, error: vErr } = await supabaseClient
            .from('business_videos')
            .select('video_url, thumbnail_url')
            .eq('business_id', businessId)
            .limit(1).single();
        if (vErr && vErr.code !== 'PGRST116') console.warn('[VIDEO] DB error:', vErr);
        businessData._video = videos || null;
        /* fallback: video_url column */
        if (!businessData._video && businessData.video_url) {
            businessData._video = { video_url: businessData.video_url, thumbnail_url: null };
        }
        console.log('[VIDEO] video:', businessData._video);
    } catch(err) { console.warn('[VIDEO] Error:', err); businessData._video = null; }

    renderProfile();
}

            <div class="video-wrap">
                <video src="${businessData._video.video_url}" controls

                <div class="video-lbl">${t('فيديو تعريفي','Vidéo de présentation')}</div>
            </div>
        </div>` : '';

    document.getElementById('pw').innerHTML = `
        ${vacHTML}
        ${coverHTML ? `<div class="cover">${coverHTML}</div>` : ''}

        <div class="hero">
            <div class="avatar-ring">
                <div class="avatar-inner">
                    <img src="${businessData.logo_url||'../assets/images/default-business.png'}"
                         alt="" onerror="this.src='../assets/images/default-business.png'">
                </div>
            </div>
            <div class="hero-info">
                <div class="hero-name">
                    ${DOMPurify.sanitize(businessData.business_name||'')}
                    ${goldB}${warnB}${newB}
                </div>
                <div class="hero-user">@${businessData.username||''}</div>
            </div>
            <div class="hero-actions">${actionBtns}</div>
        </div>

        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-val" style="color:${starColor}">${starsHTML(avg)}</div>
                <div class="stat-lbl">${avg.toFixed(1)} / 5</div>
            </div>
            <div class="stat-item">
                <div class="stat-val">${cnt}</div>
                <div class="stat-lbl">${t('تقييم','Avis')}</div>
            </div>
            <div class="stat-item">
                <div class="stat-val">${businessData.followers_count||0}</div>
                <div class="stat-lbl">${t('متابع','Abonné')}</div>
            </div>
            <div class="stat-item">
                <div class="stat-val">${businessData.subscription_tier==='gold'?'⭐':'🔹'}</div>
                <div class="stat-lbl">${businessData.subscription_tier||'—'}</div>

        </div>

            <div class="section-title">📝 ${t('نبذة عني','À propos')}</div>
            <p>${DOMPurify.sanitize(businessData.bio||t('لا يوجد وصف','Aucune description'))}</p>
        </div>

        <div class="tabs-bar" id="tabsBar">

/* ── 9. TAB CONTENT ── */
async function renderTabContent() {
    const container = document.getElementById('tabContent');
    if (!container) return;
    container.innerHTML = `<div class="loading-state" style="padding:30px 0"><div class="spinner"></div></div>`;
    console.log('[TAB] Loading:', activeTab);

    try {
        if      (activeTab==='posts')   await renderPosts(container);
        else if (activeTab==='gallery') renderGallery(container);
        else if (activeTab==='reviews') await renderReviews(container);
        else if (activeTab==='info')    renderInfo(container);
    } catch(err) {
        console.error('[TAB] Error in tab', activeTab, ':', err);
        container.innerHTML = `<div class="error-state">❌ ${t('خطأ في التحميل','Erreur de chargement')}</div>`;
    }
}

/* gallery */
let lbImages = [];
let lbIndex  = 0;

function openLightbox(imgs, idx) {
    lbImages = imgs;
    lbIndex  = idx;
    document.getElementById('lbImg').src = lbImages[lbIndex];
    document.getElementById('lbCounter').textContent = `${lbIndex+1} / ${lbImages.length}`;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
}
window.lbNav = function(dir) {
    lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
    const img = document.getElementById('lbImg');
    img.style.opacity = '0';
    setTimeout(() => {
        img.src = lbImages[lbIndex];
        img.style.opacity = '1';
        document.getElementById('lbCounter').textContent = `${lbIndex+1} / ${lbImages.length}`;
    }, 150);
};
window.closeLightbox = function() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
};
window.lbClose = function(e) {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
};

/* keyboard nav */
document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key==='ArrowLeft'||e.key==='ArrowUp')   lbNav(-1);
    if (e.key==='ArrowRight'||e.key==='ArrowDown') lbNav(1);
    if (e.key==='Escape') closeLightbox();
});

function renderGallery(c) {
    console.log('[TAB:GALLERY] Images:', businessData._gallery?.length);
    if (!businessData._gallery?.length) {
        c.innerHTML = `<div class="empty-state"><div class="empty-icon">📸</div>${t('لا توجد صور في الألبوم','Aucune photo dans la galerie')}</div>`;
        return;
    }
    const urls = businessData._gallery.map(img => img.image_url||img);
    c.innerHTML = `<div class="gallery-grid">
        ${urls.map((url, i) => `
            <img src="${url}" alt="" loading="lazy"
                 data-index="${i}"
                 style="cursor:zoom-in">`).join('')}
    </div>`;
    c.querySelectorAll('.gallery-grid img').forEach((img, i) => {
        img.addEventListener('click', () => openLightbox(urls, i));

}

window.toggleFollow = async function() {
    if (!currentUserProfile) { window.auth.signInWithGoogle(); return; }
    try {
        if (userIsFollowing) {
            console.log('[FOLLOW] Unfollowing...');
            await lilaAPI.unfollowBusiness(currentUserProfile.id, businessId);
            userIsFollowing = false;
            showToast(t('تم إلغاء المتابعة','Désabonné(e)'), 'info');
        } else {
            console.log('[FOLLOW] Following...');
            await lilaAPI.followBusiness(currentUserProfile.id, businessId);
            userIsFollowing = true;
            showToast(t('تمت المتابعة','Abonné(e)'), 'success');
        }
        renderProfile();
    } catch(err) {
        console.error('[FOLLOW] Error:', err);
        showToast(t('حدث خطأ','Erreur'), 'error');
    }
};

window.toggleFavorite = async function() {
    if (!currentUserProfile) { window.auth.signInWithGoogle(); return; }
    try {
        if (userIsFavorited) {
            console.log('[FAV] Removing...');
            await lilaAPI.removeFromFavorites(currentUserProfile.id, businessId);
            userIsFavorited = false;
            showToast(t('تمت الإزالة من المفضلة','Retiré des favoris'), 'info');
        } else {
            console.log('[FAV] Adding...');
            await lilaAPI.addToFavorites(currentUserProfile.id, businessId);
            userIsFavorited = true;
            showToast(t('تمت الإضافة للمفضلة','Ajouté aux favoris'), 'success');
        }
        renderProfile();
    } catch(err) {
        console.error('[FAV] Error:', err);
        showToast(t('حدث خطأ','Erreur'), 'error');
    }
};

window.bookNow = function() {
    console.log('[BOOK] bookNow, user:', currentUserProfile?.user_type);
    if (!currentUserProfile) {
        if (confirm(t('للحجز يجب تسجيل الدخول. هل تريدين تسجيل الدخول الآن؟',
                      'Pour réserver, connectez-vous. Voulez-vous vous connecter ?'))) {
            window.auth.signInWithGoogle();
        }
        return;
    }
    console.log('[BOOK] Redirecting to booking.html...');
    window.location.href = `booking.html?business=${businessId}`;
};

document.addEventListener('DOMContentLoaded', async () => {
    console.log('[INIT] DOMContentLoaded...');
    await loadBusinessProfile();
    console.log('[INIT] Done.');
});
