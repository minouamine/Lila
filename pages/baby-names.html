<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ليلى | أسماء الأطفال</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        /* ========== OVERRIDE: full-bleed iframe child ========== */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--c-bg);
            font-family: 'Cairo', sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
        }
        body::before {
            display: none; /* parent already has ambient glow */
        }

        /* Container fills iframe */
        .app {
            width: 100%;
            max-width: 100%;
            height: 100%;
            min-height: 100%;
            border-radius: 0;
            border: none;
            box-shadow: none;
            animation: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 14px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ========== SEARCH ========== */
        .search-wrapper {
            position: relative;
            margin-bottom: 8px;
        }

        .search-input {
            width: 100%;
            padding: 12px 50px 12px 20px;
            font-size: 0.92rem;
            font-family: 'Cairo', sans-serif;
            background: var(--c-card);
            border: 1px solid var(--c-border-act);
            border-radius: 12px;
            color: var(--c-text);
            outline: none;
            transition: all var(--t);
            text-align: right;
        }
        .search-input::placeholder {
            color: var(--c-text-3);
        }
        .search-input:focus {
            border-color: var(--c-primary);
            box-shadow: 0 0 0 3px var(--c-glow-soft),
                        0 0 30px rgba(50,205,50,0.06);
        }

        /* ========== STATS ========== */
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 8px 14px;
            background: var(--c-surface);
            border-radius: 40px;
            border: 1px solid var(--c-border);
        }

        .stats-count {
            color: var(--c-text-2);
            font-size: 0.82rem;
            font-weight: 600;
        }
        .stats-count span {
            color: var(--c-primary);
            font-weight: 800;
            font-size: 1.05rem;
        }

        .gender-indicator {
            color: var(--c-primary-light);
            font-weight: 700;
            font-size: 0.82rem;
        }

        /* ========== NAMES GRID ========== */
        .names-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .name-card {
            background: var(--c-card);
            border: 1px solid var(--c-border);
            border-radius: 16px;
            padding: 18px;
            transition: all 0.25s var(--ease-smooth);
            animation: cardIn 0.35s var(--ease-smooth) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .name-card:hover {
            transform: translateY(-2px);
            border-color: var(--c-border-act);
            box-shadow: 0 8px 24px var(--c-glow-soft), 0 0 0 1px var(--c-border-act);
            background: var(--c-card-h);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--c-border);
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .name-text {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--c-primary-light), var(--c-primary));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .name-id {
            font-size: 0.65rem;
            background: var(--c-glow-soft);
            padding: 3px 10px;
            border-radius: 30px;
            color: var(--c-text-2);
            font-weight: 700;
            border: 1px solid var(--c-border);
        }

        .meaning-text {
            color: var(--c-text);
            line-height: 1.8;
            font-size: 0.9rem;
        }

        /* ========== EMPTY / LOADING STATES ========== */
        .empty-state, .loading {
            text-align: center;
            padding: 50px 20px;
            color: var(--c-text-2);
            background: var(--c-surface);
            border-radius: 16px;
            font-size: 0.95rem;
            border: 1px solid var(--c-border);
        }

        /* ========== BOTTOM NAV ========== */
        .bottom-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 10px 16px 14px;
            background: var(--c-surface);
            border-top: 1px solid var(--c-border);
            flex-shrink: 0;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: 1.5px solid var(--c-border);
            cursor: pointer;
            padding: 8px 24px;
            border-radius: 14px;
            transition: all 0.22s var(--ease-snap);
            color: var(--c-text-2);
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 0.78rem;
        }

        .nav-btn img {
            width: 36px;
            height: 36px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--c-border);
            transition: 0.2s;
        }

        .nav-btn.active {
            color: var(--c-primary);
            border-color: var(--c-primary);
            background: var(--c-glow-soft);
            box-shadow: 0 4px 14px var(--c-glow);
        }
        .nav-btn.active img {
            border-color: var(--c-primary);
            box-shadow: 0 0 10px var(--c-glow);
        }
        .nav-btn:hover {
            transform: translateY(-2px);
            border-color: var(--c-border-act);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .main-content { padding: 10px 12px 14px; }
            .name-text { font-size: 1.25rem; }
            .nav-btn { padding: 6px 16px; }
            .nav-btn img { width: 32px; height: 32px; }
        }
    </style>
<base target="_blank">
</head>
<body>

<div class="app">
    <div class="main-content">
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 ابحث عن اسم...">
        </div>

        <div class="stats">
            <div class="stats-count"><span id="countDisplay">0</span> اسم</div>
            <div class="gender-indicator" id="genderIndicator">👧 أسماء البنات</div>
        </div>

        <div id="namesContainer" class="names-grid">
            <div class="loading">✨ جاري تحميل الأسماء... ✨</div>
        </div>
    </div>

    <div class="bottom-nav">
        <button id="girlsBtn" class="nav-btn active">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffb6c1'/%3E%3Ccircle cx='35' cy='38' r='5' fill='%23333'/%3E%3Ccircle cx='65' cy='38' r='5' fill='%23333'/%3E%3Cpath d='M42 65 Q50 78 58 65' stroke='%23b3413b' stroke-width='4' fill='none' stroke-linecap='round'/%3E%3Crect x='46' y='18' width='8' height='18' fill='%23ff69b4'/%3E%3C/svg%3E" alt="girl">
            <span>👧 بنات</span>
        </button>
        <button id="boysBtn" class="nav-btn">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='55' r='42' fill='%2342a5f5'/%3E%3Ccircle cx='34' cy='46' r='5' fill='%23fff'/%3E%3Ccircle cx='66' cy='46' r='5' fill='%23fff'/%3E%3Cpath d='M45 74 L55 74 L52 84 L48 84 Z' fill='%23ffa500'/%3E%3Crect x='46' y='26' width='8' height='20' fill='%23336699'/%3E%3C/svg%3E" alt="boy">
            <span>👦 أولاد</span>
        </button>
    </div>
</div>

<script>
    // State
    let currentGender = 'girls';
    let allNames = [];
    let filteredNames = [];

    // DOM Elements
    const searchInput = document.getElementById('searchInput');
    const namesContainer = document.getElementById('namesContainer');
    const countDisplay = document.getElementById('countDisplay');
    const genderIndicator = document.getElementById('genderIndicator');
    const girlsBtn = document.getElementById('girlsBtn');
    const boysBtn = document.getElementById('boysBtn');

    // Load JSON from file
    async function loadNames(gender) {
        const filePath = gender === 'girls'
            ? '/assets/data/girls_names.json'
            : '/assets/data/boys_names.json';

        try {
            const response = await fetch(filePath);

            if (!response.ok) {
                console.warn(`File not found: ${filePath}`);
                return [];
            }

            const data = await response.json();

            if (!Array.isArray(data)) {
                console.warn(`Invalid data format from ${filePath}`);
                return [];
            }

            // Debug: log first item to see available fields
            if (data.length > 0) {
                console.log('First item fields:', Object.keys(data[0]));
                console.log('Sample item:', data[0]);
            }

            return data;
        } catch (error) {
            console.error(`Error loading ${filePath}:`, error);
            return [];
        }
    }

    // Get meaning from item - supports multiple possible field names
    function getMeaning(item) {
        // Try different possible field names from your JSON
        return item.شرح_الاسم ||      // with underscore
               item['شرح الاسم'] ||    // with space
               item.meaning ||
               item.description ||
               item.شرح ||
               'لا يوجد شرح';
    }

    // Get name from item
    function getName(item) {
        return item.الاسم || item.name || item.title || 'اسم غير معروف';
    }

    // Get id from item
    function getId(item) {
        return item.id || Math.floor(Math.random() * 1000);
    }

    // Render names to UI
    function renderNames() {
        if (!filteredNames || filteredNames.length === 0) {
            namesContainer.innerHTML = `<div class="empty-state">✨ لا توجد أسماء مطابقة ✨</div>`;
            countDisplay.textContent = '0';
            return;
        }

        const html = filteredNames.map(item => {
            const name = getName(item);
            const meaning = getMeaning(item);
            const id = getId(item);

            return `
                <div class="name-card">
                    <div class="card-header">
                        <div class="name-text">${escapeHtml(name)}</div>
                        <div class="name-id">#${id}</div>
                    </div>
                    <div class="meaning-text">${escapeHtml(meaning)}</div>
                </div>
            `;
        }).join('');

        namesContainer.innerHTML = html;
        countDisplay.textContent = filteredNames.length;
    }

    // Filter names based on search input
    async function filterNames() {
        const searchTerm = searchInput.value.trim().toLowerCase();

        if (!searchTerm) {
            // إذا كان البحث فارغًا، اعرض القائمة الحالية فقط
            filteredNames = [...allNames];
            renderNames();
            return;
        }

        // ابحث في كلا الملفين (بنات وأولاد)
        const girlsData = await loadNames('girls');
        const boysData = await loadNames('boys');

        const allNamesCombined = [...girlsData, ...boysData];

        filteredNames = allNamesCombined.filter(item => {
            const name = getName(item).toLowerCase();
            return name.includes(searchTerm);
        });

        renderNames();
        genderIndicator.innerHTML = `🔍 نتائج البحث عن "${searchTerm}" (${filteredNames.length} اسم)`;
    }

    // Switch between girls and boys
    async function switchToGender(gender) {
        currentGender = gender;

        // Update UI indicators
        if (gender === 'girls') {
            genderIndicator.innerHTML = '👧 أسماء البنات';
            girlsBtn.classList.add('active');
            boysBtn.classList.remove('active');
        } else {
            genderIndicator.innerHTML = '👦 أسماء الأولاد';
            boysBtn.classList.add('active');
            girlsBtn.classList.remove('active');
        }

        // Show loading state
        namesContainer.innerHTML = '<div class="loading">✨ جاري التحميل... ✨</div>';
        countDisplay.textContent = '0';

        // Load data
        allNames = await loadNames(gender);

        console.log(`Loaded ${allNames.length} names for ${gender}`);

        filteredNames = [...allNames];

        // Clear search input
        searchInput.value = '';

        // Render
        renderNames();
    }

    // Helper function to escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // Event listeners
    searchInput.addEventListener('input', filterNames);

    girlsBtn.addEventListener('click', () => {
        if (currentGender !== 'girls') {
            switchToGender('girls');
        }
    });

    boysBtn.addEventListener('click', () => {
        if (currentGender !== 'boys') {
            switchToGender('boys');
        }
    });

    // Initialize with girls names
    switchToGender('girls');
</script>
<script src="../js/debug.js"></script>
</body>
</html>
